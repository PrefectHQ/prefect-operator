[tools]
actionlint = "1.7.11"
ginkgo = '2.25.2'
golang = '1.26'
golangci-lint = "2.10.1"
"go:golang.org/x/tools/cmd/goimports" = "0.42.0"
'go:fybrik.io/crdoc' = 'latest'
helm = "4.1"
helm-ct = "3.14.0"
helm-docs = "1.14.2"
kube-controller-tools = { version = "0.20.1", exe = "controller-gen" }
kubectl = "1.35"
kustomize = "5.8.1"
