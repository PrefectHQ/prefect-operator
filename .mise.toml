[tools]
actionlint = "1.7.12"
ginkgo = "2.32.0"
golang = '1.26'
golangci-lint = "2.12.2"
"go:golang.org/x/tools/cmd/goimports" = "0.47.0"
"github:fybrik/crdoc" = "0.6.4"
helm = "4.2"
helm-ct = "3.14.0"
helm-docs = "1.14.2"
kube-controller-tools = { version = "0.21.0", exe = "controller-gen" }
kubectl = "1.36"
kustomize = "5.8.1"
pre-commit = "4.6.0"
setup-envtest = "0.24.1"
shellcheck = "0.11.0"
yamllint = "1.38.0"
yq = "4.53.3"

[settings]
experimental = true
